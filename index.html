<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>囚人脱走阻止ゲーム</title>

<style>

body{
margin:0;
background:#222;
color:white;
font-family:sans-serif;
text-align:center;
}

#info{
font-size:20px;
margin:10px;
}

canvas{
background:#333;
border:4px solid white;
}

#controls{
margin-top:10px;
}

button{
font-size:24px;
padding:10px 20px;
margin:5px;
}

</style>
</head>

<body>

<h2>🚓囚人脱走阻止ゲーム</h2>

<div id="info">
捕まえた数: <span id="score">0</span> / 10 |
残り時間: <span id="time">30</span>
</div>

<canvas id="game" width="400" height="400"></canvas>

<div id="controls">
<button onclick="move(0,-1)">↑</button><br>
<button onclick="move(-1,0)">←</button>
<button onclick="move(1,0)">→</button><br>
<button onclick="move(0,1)">↓</button>
</div>

<script>

const canvas=document.getElementById("game")
const ctx=canvas.getContext("2d")

const scoreText=document.getElementById("score")
const timeText=document.getElementById("time")

let score=0
let time=30

//警察
let police={x:200,y:200,size:15}

//囚人
let prisoners=[]

for(let i=0;i<3;i++){
spawnPrisoner()
}

function spawnPrisoner(){

prisoners.push({
x:Math.random()*360+20,
y:Math.random()*360+20,
size:15
})

}

//部屋の壁
const walls=[
{x:195,y:0,w:10,h:160},
{x:195,y:240,w:10,h:160},
{x:0,y:195,w:160,h:10},
{x:240,y:195,w:160,h:10}
]

//ドア
const doors=[
{x:195,y:160,w:10,h:80},
{x:160,y:195,w:80,h:10}
]

function draw(){

ctx.clearRect(0,0,400,400)

//部屋
ctx.fillStyle="#555"
walls.forEach(w=>{
ctx.fillRect(w.x,w.y,w.w,w.h)
})

//ドア
ctx.fillStyle="yellow"
doors.forEach(d=>{
ctx.fillRect(d.x,d.y,d.w,d.h)
})

//警察
ctx.fillStyle="blue"
ctx.beginPath()
ctx.arc(police.x,police.y,police.size,0,Math.PI*2)
ctx.fill()

//囚人
ctx.fillStyle="red"
prisoners.forEach(p=>{
ctx.beginPath()
ctx.arc(p.x,p.y,p.size,0,Math.PI*2)
ctx.fill()
})

}

function move(dx,dy){

police.x+=dx*10
police.y+=dy*10

//壁判定
walls.forEach(w=>{
if(police.x>w.x-15&&
police.x<w.x+w.w+15&&
police.y>w.y-15&&
police.y<w.y+w.h+15){

police.x-=dx*10
police.y-=dy*10

}
})

//捕まえる
prisoners=prisoners.filter(p=>{

let dist=Math.hypot(police.x-p.x,police.y-p.y)

if(dist<20){

score++
scoreText.textContent=score
spawnPrisoner()

return false
}

return true

})

}

document.addEventListener("keydown",e=>{

if(e.key==="ArrowUp")move(0,-1)
if(e.key==="ArrowDown")move(0,1)
if(e.key==="ArrowLeft")move(-1,0)
if(e.key==="ArrowRight")move(1,0)

})

function movePrisoners(){

prisoners.forEach(p=>{

p.x+=(Math.random()-0.5)*6
p.y+=(Math.random()-0.5)*6

p.x=Math.max(10,Math.min(390,p.x))
p.y=Math.max(10,Math.min(390,p.y))

})

}

setInterval(movePrisoners,200)

function loop(){

draw()

if(score>=10){

alert("囚人を全員捕まえた！クリア！")
location.reload()

}

requestAnimationFrame(loop)

}

loop()

//タイマー
setInterval(()=>{

time--
timeText.textContent=time

if(time<=0){

alert("囚人に暗殺された…ゲームオーバー")
location.reload()

}

},1000)

</script>

</body>
</html>
