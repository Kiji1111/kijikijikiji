<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>スナイパーチャレンジ</title>

<style>

body{
margin:0;
text-align:center;
font-family:sans-serif;
background:#222;
color:white;
}

#game{
width:400px;
height:600px;
margin:auto;
background:#333;
border:3px solid white;
position:relative;
overflow:hidden;
cursor:crosshair;
}

.target{
width:40px;
height:40px;
background:red;
border-radius:50%;
position:absolute;
}

#score{
font-size:24px;
margin:10px;
}

#bullets{
font-size:20px;
}

</style>
</head>

<body>

<h2>🎯スナイパーチャレンジ</h2>

<div id="score">Score:0</div>
<div id="bullets">弾:10</div>

<div id="game"></div>

<script>

const game=document.getElementById("game")
const scoreText=document.getElementById("score")
const bulletsText=document.getElementById("bullets")

let score=0
let bullets=10
let targets=[]

function createTarget(){

let t=document.createElement("div")
t.className="target"

t.style.left=Math.random()*360+"px"
t.style.top=Math.random()*560+"px"

game.appendChild(t)

targets.push(t)

}

setInterval(createTarget,1000)

game.addEventListener("click",e=>{

if(bullets<=0)return

bullets--

bulletsText.innerText="弾:"+bullets

let rect=game.getBoundingClientRect()

let x=e.clientX-rect.left
let y=e.clientY-rect.top

targets.forEach((t,i)=>{

let tx=t.offsetLeft
let ty=t.offsetTop

if(
x>tx &&
x<tx+40 &&
y>ty &&
y<ty+40
){

score++
scoreText.innerText="Score:"+score

t.remove()
targets.splice(i,1)

}

})

if(bullets===0){

setTimeout(()=>{

alert("ゲーム終了！ Score:"+score)
location.reload()

},200)

}

})

</script>

</body>
</html>
