<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>押すだけゲーム</title>

<style>

body{
text-align:center;
font-family:sans-serif;
background:#222;
color:white;
}

button{
font-size:40px;
padding:30px 60px;
margin-top:100px;
cursor:pointer;
}

#score{
font-size:30px;
margin-top:20px;
}

</style>
</head>

<body>

<h1>押すだけゲーム</h1>

<button id="btn">押す</button>

<div id="score">Score:0</div>

<script>

let score=0
const btn=document.getElementById("btn")
const scoreText=document.getElementById("score")

btn.onclick=function(){

//10%で爆発
if(Math.random()<0.1){

alert("💥爆発した！ゲームオーバー\nScore:"+score)
location.reload()

}else{

score++
scoreText.innerText="Score:"+score

}

}

</script>

</body>
</html>
