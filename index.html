
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>囚人脱走ゲーム</title>

<style>

body{
margin:0;
font-family:sans-serif;
text-align:center;
background:#222;
color:white;
}

#game{
width:400px;
height:600px;
margin:auto;
display:grid;
grid-template-columns:1fr 1fr;
grid-template-rows:1fr 1fr;
gap:4px;
}

.room{
background:#444;
position:relative;
overflow:hidden;
}

.prisoner{
position:absolute;
font-size:30px;
cursor:pointer;
}

#info{
margin:10px;
font-size:20px;
}

</style>
</head>

<body>

<h2>🚔囚人脱走阻止ゲーム</h2>

<div id="info">
捕まえた数: <span id="score">0</span> / 10 |
残り時間: <span id="time">30</span>
</div>

<div id="game">
<div class="room"></div>
<div class="room"></div>
<div class="room"></div>
<div class="room"></div>
</div>

<script>

const rooms=document.querySelectorAll(".room")
const scoreText=document.getElementById("score")
const timeText=document.getElementById("time")

let score=0
let time=30

function createPrisoner(){

let room=rooms[Math.floor(Math.random()*4)]

let p=document.createElement("div")
p.className="prisoner"
p.innerText="🧑‍🦱"

p.style.left=Math.random()*120+"px"
p.style.top=Math.random()*200+"px"

room.appendChild(p)

//クリックで捕まえる
p.onclick=function(){

score++
scoreText.innerText=score

p.remove()

if(score>=10){

alert("囚人を全員捕まえた！クリア！")
location.reload()

}

}

//逃げ回る
let move=setInterval(()=>{

p.style.left=Math.random()*120+"px"
p.style.top=Math.random()*200+"px"

},800)

//時間切れ
setTimeout(()=>{

clearInterval(move)

if(p.parentNode){

alert("囚人に暗殺された…ゲームオーバー")
location.reload()

}

},30000)

}

setInterval(createPrisoner,1200)

//タイマー
let timer=setInterval(()=>{

time--
timeText.innerText=time

if(time<=0){

clearInterval(timer)

if(score<10){

alert("時間切れ！囚人に暗殺された…")
location.reload()

}

}

},1000)

</script>

</body>
</html>
