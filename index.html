<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>バトルアクションゲーム</title>

<style>

body{
margin:0;
background:#222;
color:white;
text-align:center;
font-family:sans-serif;
}

canvas{
background:#333;
border:4px solid white;
}

#ui{
margin:10px;
}

button{
font-size:18px;
padding:10px;
margin:5px;
}

</style>
</head>

<body>

<h2>⚔ 前から来る敵を倒してゴール！</h2>

<div id="ui">
攻撃ゲージ: <span id="power">0</span>/5
</div>

<canvas id="game" width="500" height="300"></canvas>

<br>

<button onclick="attack()">攻撃</button>
<button onclick="special()">必殺技</button>

<script>

const canvas=document.getElementById("game")
const ctx=canvas.getContext("2d")

let player={x:50,y:200,hp:5}

let enemies=[]

let power=0

let goal=450

function spawnEnemy(){

enemies.push({
x:500,
y:200,
hp:2
})

}

setInterval(spawnEnemy,2000)

function attack(){

enemies.forEach(e=>{

if(Math.abs(e.x-player.x)<60){

e.hp--

power++

if(power>5)power=5

document.getElementById("power").textContent=power

}

})

}

function special(){

if(power>=5){

enemies=[]

power=0

document.getElementById("power").textContent=power

alert("必殺技！！全滅！")

}

}

function update(){

//敵移動
enemies.forEach(e=>{
e.x-=2
})

//敵攻撃
enemies.forEach(e=>{

if(Math.abs(e.x-player.x)<20){

player.hp--

e.x+=40

if(player.hp<=0){

alert("やられた！ゲームオーバー")
location.reload()

}

}

})

//倒された敵削除
enemies=enemies.filter(e=>e.hp>0)

//プレイヤー前進
player.x+=0.3

if(player.x>=goal){

alert("ゴール！クリア！")
location.reload()

}

}

function draw(){

ctx.clearRect(0,0,500,300)

//地面
ctx.fillStyle="green"
ctx.fillRect(0,220,500,80)

//ゴール
ctx.fillStyle="yellow"
ctx.fillRect(goal,180,10,40)

//プレイヤー
ctx.fillStyle="blue"
ctx.fillRect(player.x,player.y,20,20)

//敵
ctx.fillStyle="red"
enemies.forEach(e=>{
ctx.fillRect(e.x,e.y,20,20)
})

}

function loop(){

update()
draw()

requestAnimationFrame(loop)

}

loop()

</script>

</body>
</html>
