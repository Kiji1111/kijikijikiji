<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>きじのぼりゲーム</title>

<style>

body{
margin:0;
text-align:center;
font-family:sans-serif;
background:linear-gradient(#87ceeb,#ffffff);
}

#game{
width:400px;
height:600px;
margin:auto;
background:#cfefff;
border:3px solid black;
position:relative;
overflow:hidden;
}

#bird{
width:30px;
height:30px;
background:orange;
border-radius:50%;
position:absolute;
}

.platform{
width:80px;
height:10px;
background:green;
position:absolute;
}

.spike{
width:20px;
height:20px;
background:red;
position:absolute;
clip-path:polygon(50% 0%,0% 100%,100% 100%);
}

#goal{
position:absolute;
font-size:40px;
}

</style>
</head>

<body>

<h2>🐦きじのぼり</h2>
<p>足場に飛び移って神様の家へ</p>

<div id="game">

<div id="bird"></div>
<div id="goal">🏠</div>

</div>

<script>

const game=document.getElementById("game")
const bird=document.getElementById("bird")
const goal=document.getElementById("goal")

let x=180
let y=520
let vy=0
let gravity=0.6

let platforms=[]
let spikes=[]
let height=0

bird.style.left=x+"px"
bird.style.top=y+"px"

goal.style.left="170px"
goal.style.top="-2000px"

function createPlatform(x,y){

let p=document.createElement("div")
p.className="platform"
p.style.left=x+"px"
p.style.top=y+"px"

game.appendChild(p)
platforms.push(p)

}

function createSpike(x,y){

let s=document.createElement("div")
s.className="spike"
s.style.left=x+"px"
s.style.top=y+"px"

game.appendChild(s)
spikes.push(s)

}

for(let i=0;i<15;i++){

createPlatform(Math.random()*320,550-i*120)

createSpike(0,550-i*120)
createSpike(380,550-i*120)

}

function jump(){

if(vy>-2){
vy=-12
}

}

document.addEventListener("keydown",e=>{

if(e.key==="ArrowLeft") x-=20
if(e.key==="ArrowRight") x+=20
if(e.key===" ") jump()

})

document.addEventListener("touchstart",e=>{

let tx=e.touches[0].clientX

if(tx<window.innerWidth/2){
x-=25
}else{
x+=25
}

jump()

})

function update(){

vy+=gravity
y+=vy

if(x<0)x=0
if(x>370)x=370

platforms.forEach(p=>{

let px=p.offsetLeft
let py=p.offsetTop

if(
y+30>py &&
y+30<py+10 &&
x+15>px &&
x<px+80 &&
vy>0
){
vy=-12
}

})

spikes.forEach(s=>{

let sx=s.offsetLeft
let sy=s.offsetTop

if(
x+25>sx &&
x<sx+20 &&
y+25>sy &&
y<sy+20
){
alert("トゲに当たった！ゲームオーバー")
location.reload()
}

})

if(y<250){

let diff=250-y
y=250

platforms.forEach(p=>{
p.style.top=(p.offsetTop+diff)+"px"
})

spikes.forEach(s=>{
s.style.top=(s.offsetTop+diff)+"px"
})

goal.style.top=(goal.offsetTop+diff)+"px"

height+=diff

}

if(height>2000){

alert("神様の家に到着！クリア！")
location.reload()

}

bird.style.left=x+"px"
bird.style.top=y+"px"

requestAnimationFrame(update)

}

update()

</script>

</body>
</html>
