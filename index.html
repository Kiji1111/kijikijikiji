<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>鳥のぼりゲーム</title>

<style>

body{
margin:0;
background:skyblue;
text-align:center;
font-family:sans-serif;
}

canvas{
background:linear-gradient(skyblue,white);
border:4px solid black;
}

#controls{
margin-top:10px;
}

button{
font-size:22px;
padding:10px 15px;
margin:5px;
}

</style>
</head>

<body>

<h2>🐦 鳥のぼりゲーム</h2>

<canvas id="game" width="400" height="600"></canvas>

<div id="controls">
<button onclick="moveLeft()">⬅</button>
<button onclick="jump()">⬆ジャンプ</button>
<button onclick="moveRight()">➡</button>
</div>

<script>

const canvas=document.getElementById("game")
const ctx=canvas.getContext("2d")

let gravity=0.5

let bird={
x:180,
y:550,
vy:0,
width:20,
height:20,
onGround:false
}

let camera=0

//足場
let platforms=[]

for(let i=0;i<40;i++){

platforms.push({
x:Math.random()*350,
y:550-i*80,
w:80,
h:10
})

}

//トゲ
let spikes=[]

for(let i=0;i<20;i++){

spikes.push({
x:Math.random()*360,
y:500-i*120
})

}

let goalY=-2800

function moveLeft(){
bird.x-=20
}

function moveRight(){
bird.x+=20
}

function jump(){

if(bird.onGround){
bird.vy=-10
bird.onGround=false
}

}

document.addEventListener("keydown",e=>{

if(e.key==="ArrowLeft")moveLeft()
if(e.key==="ArrowRight")moveRight()
if(e.key==="ArrowUp")jump()

})

function update(){

bird.vy+=gravity
bird.y+=bird.vy

bird.onGround=false

//足場判定
platforms.forEach(p=>{

if(
bird.x+bird.width>p.x &&
bird.x<p.x+p.w &&
bird.y+bird.height>p.y &&
bird.y+bird.height<p.y+15 &&
bird.vy>0
){

bird.y=p.y-bird.height
bird.vy=0
bird.onGround=true

}

})

//落下
if(bird.y>700){

alert("落ちた！ゲームオーバー")
location.reload()

}

//トゲ
spikes.forEach(s=>{

if(
bird.x+20>s.x &&
bird.x<s.x+20 &&
bird.y+20>s.y &&
bird.y<s.y+20
){

alert("トゲに当たった！ゲームオーバー")
location.reload()

}

})

//カメラ
camera=bird.y-300

//ゴール
if(bird.y<goalY){

alert("神様の家に到着！クリア！")
location.reload()

}

}

function draw(){

ctx.clearRect(0,0,400,600)

//鳥
ctx.fillStyle="orange"
ctx.fillRect(bird.x,bird.y-camera,20,20)

//足場
ctx.fillStyle="brown"
platforms.forEach(p=>{
ctx.fillRect(p.x,p.y-camera,p.w,p.h)
})

//トゲ
ctx.fillStyle="red"
spikes.forEach(s=>{
ctx.fillRect(s.x,s.y-camera,20,20)
})

//神様の家
ctx.fillStyle="gold"
ctx.fillRect(150,goalY-camera,100,40)

ctx.fillStyle="black"
ctx.fillText("神様の家",160,goalY-camera+25)

}

function loop(){

update()
draw()
requestAnimationFrame(loop)

}

loop()

</script>

</body>
</html>
