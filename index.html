<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>きじのぼりゲーム</title>

<style>
body{
margin:0;
text-align:center;
font-family:sans-serif;
background:linear-gradient(#aee1ff,#ffffff);
}

h2{
margin:10px;
}

#game{
width:100%;
max-width:400px;
height:600px;
margin:auto;
background:linear-gradient(#87ceeb,#e0f7ff);
border:3px solid #333;
position:relative;
overflow:hidden;
}

#bird{
position:absolute;
font-size:35px;
}

.platform{
position:absolute;
width:80px;
height:10px;
background:#4caf50;
border-radius:5px;
}

#ground{
position:absolute;
width:100%;
height:20px;
background:#8B5A2B;
bottom:0;
}

#goal{
position:absolute;
font-size:40px;
}

#score{
margin:10px;
font-size:20px;
}

</style>
</head>

<body>

<h2>🐦きじのぼり</h2>
<p>タップしてジャンプ！神様の家まで登ろう</p>

<div id="game">

<div id="bird">🐦</div>
<div id="ground"></div>
<div id="goal">🏠✨</div>

</div>

<div id="score">高さ:0</div>

<script>

const game = document.getElementById("game")
const bird = document.getElementById("bird")
const goal = document.getElementById("goal")
const scoreText = document.getElementById("score")

let birdX = 180
let birdY = 540
let velocity = 0
let gravity = 0.6

let platforms=[]
let height=0

bird.style.left=birdX+"px"
bird.style.top=birdY+"px"

goal.style.top="-2000px"
goal.style.left="160px"

function createPlatform(x,y){

const p=document.createElement("div")
p.className="platform"

p.style.left=x+"px"
p.style.top=y+"px"

game.appendChild(p)

platforms.push(p)

}

//足場を作る
for(let i=1;i<20;i++){

createPlatform(Math.random()*300,550-i*120)

}

function jump(){

//地面または足場のときだけジャンプ
if(velocity>-2){
velocity=-12
}

}

document.addEventListener("touchstart",jump)
document.addEventListener("mousedown",jump)

function update(){

velocity+=gravity
birdY+=velocity

//地面
if(birdY>540){
birdY=540
velocity=0
}

//足場判定
platforms.forEach(p=>{

let px=p.offsetLeft
let py=p.offsetTop

if(
birdY+40>py &&
birdY+40<py+10 &&
birdX+20>px &&
birdX<px+80 &&
velocity>0
){
velocity=-12
}

})

//上に行くとスクロール
if(birdY<300){

let diff=300-birdY
birdY=300

platforms.forEach(p=>{
p.style.top=(p.offsetTop+diff)+"px"
})

goal.style.top=(goal.offsetTop+diff)+"px"

height+=Math.floor(diff)

scoreText.innerText="高さ:"+height

}

//ゴール
if(height>2000){

alert("神様の家に到着！クリア！✨")

location.reload()

}

bird.style.top=birdY+"px"

requestAnimationFrame(update)

}

update()

</script>

</body>
</html>
