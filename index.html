<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>鳥アドベンチャー</title>

<style>

body{
margin:0;
background:#87CEEB;
text-align:center;
font-family:sans-serif;
}

canvas{
background:#87CEEB;
border:4px solid black;
}

#controls{
margin-top:10px;
}

button{
font-size:20px;
padding:10px 15px;
margin:5px;
}

</style>
</head>

<body>

<h2>🐦 鳥アドベンチャー</h2>

<canvas id="game" width="500" height="300"></canvas>

<div id="controls">
<button onclick="left()">⬅</button>
<button onclick="jump()">⬆ジャンプ</button>
<button onclick="right()">➡</button>
</div>

<script>

const canvas=document.getElementById("game")
const ctx=canvas.getContext("2d")

let worldWidth=3000

let bird={
x:50,
y:200,
vy:0,
onGround:false
}

let camera=0

let obstacles=[]

//障害物生成
for(let i=300;i<worldWidth;i+=250){

obstacles.push({
x:i,
y:220,
w:30,
h:30
})

}

let goal=2800

function left(){
bird.x-=20
}

function right(){
bird.x+=20
}

function jump(){

if(bird.onGround){
bird.vy=-10
bird.onGround=false
}

}

document.addEventListener("keydown",e=>{

if(e.key==="ArrowLeft")left()
if(e.key==="ArrowRight")right()
if(e.key==="ArrowUp")jump()

})

function update(){

//重力
bird.vy+=0.5
bird.y+=bird.vy

//地面
if(bird.y>200){
bird.y=200
bird.vy=0
bird.onGround=true
}

//カメラ
camera=bird.x-150

//障害物判定
obstacles.forEach(o=>{

if(bird.x+20>o.x &&
bird.x<o.x+o.w &&
bird.y+20>o.y){

alert("障害物に当たった！ゲームオーバー")
location.reload()

}

})

//ゴール
if(bird.x>goal){

alert("ゴール！！")
location.reload()

}

}

function draw(){

ctx.clearRect(0,0,500,300)

//地面
ctx.fillStyle="green"
ctx.fillRect(0,220,500,80)

//鳥
ctx.fillStyle="orange"
ctx.fillRect(bird.x-camera,bird.y,20,20)

//障害物
ctx.fillStyle="brown"
obstacles.forEach(o=>{
ctx.fillRect(o.x-camera,o.y,o.w,o.h)
})

//ゴール
ctx.fillStyle="yellow"
ctx.fillRect(goal-camera,180,20,40)

}

function loop(){

update()
draw()

requestAnimationFrame(loop)

}

loop()

</script>

</body>
</html>
