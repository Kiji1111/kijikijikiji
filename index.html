<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>鳥のぼりゲーム</title>

<style>

body{
margin:0;
background:skyblue;
text-align:center;
font-family:sans-serif;
}

canvas{
background:linear-gradient(skyblue,white);
border:4px solid black;
}

button{
font-size:22px;
padding:10px 15px;
margin:5px;
}

</style>
</head>

<body>

<h2>🐦 鳥のぼりゲーム</h2>

<canvas id="game" width="400" height="600"></canvas>

<br>
<button onclick="left()">⬅</button>
<button onclick="jump()">ジャンプ</button>
<button onclick="right()">➡</button>

<script>

const canvas=document.getElementById("game")
const ctx=canvas.getContext("2d")

let gravity=0.5

let bird={
x:200,
y:500,
vy:0,
w:20,
h:20
}

let cameraY=0

let platforms=[]

//足場生成
for(let i=0;i<100;i++){

platforms.push({
x:Math.random()*350,
y:600-i*80,
w:80,
h:10
})

}

//トゲ
let spikes=[]

for(let i=0;i<40;i++){

spikes.push({
x:Math.random()*380,
y:550-i*150
})

}

let goal=-7000

function left(){
bird.x-=20
}

function right(){
bird.x+=20
}

function jump(){
if(bird.vy==0){
bird.vy=-12
}
}

document.addEventListener("keydown",e=>{
if(e.key=="ArrowLeft")left()
if(e.key=="ArrowRight")right()
if(e.key=="ArrowUp")jump()
})

function update(){

bird.vy+=gravity
bird.y+=bird.vy

//足場判定
platforms.forEach(p=>{

if(
bird.x+bird.w>p.x &&
bird.x<p.x+p.w &&
bird.y+bird.h>p.y &&
bird.y+bird.h<p.y+15 &&
bird.vy>0
){

bird.y=p.y-bird.h
bird.vy=0

}

})

//落下
if(bird.y>cameraY+700){
alert("落ちた！ゲームオーバー")
location.reload()
}

//トゲ
spikes.forEach(s=>{

if(
bird.x+20>s.x &&
bird.x<s.x+20 &&
bird.y+20>s.y &&
bird.y<s.y+20
){

alert("トゲに当たった！")
location.reload()

}

})

//カメラ上昇
if(bird.y<cameraY+300){
cameraY=bird.y-300
}

//ゴール
if(bird.y<goal){
alert("神様の家に到着！")
location.reload()
}

}

function draw(){

ctx.clearRect(0,0,400,600)

//鳥
ctx.fillStyle="orange"
ctx.fillRect(bird.x,bird.y-cameraY,20,20)

//足場
ctx.fillStyle="brown"
platforms.forEach(p=>{
ctx.fillRect(p.x,p.y-cameraY,p.w,p.h)
})

//トゲ
ctx.fillStyle="red"
spikes.forEach(s=>{
ctx.fillRect(s.x,s.y-cameraY,20,20)
})

//神様の家
ctx.fillStyle="gold"
ctx.fillRect(150,goal-cameraY,100,40)

ctx.fillStyle="black"
ctx.fillText("神様の家",160,goal-cameraY+25)

}

function loop(){

update()
draw()
requestAnimationFrame(loop)

}

loop()

</script>

</body>
</html>
